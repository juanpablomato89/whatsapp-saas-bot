services:

  # ─────────────────────────────────────────────
  # PostgreSQL — Base de datos principal
  # Acceso local: localhost:5432
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: whatsapp_saas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: whatsapp_saas
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d whatsapp_saas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis — Caché y sesiones de conversación
  # Acceso local: localhost:6379
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: whatsapp_saas_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # pgAdmin — Interfaz visual para PostgreSQL
  # Acceso: http://localhost:5050
  # Login: admin@admin.com / admin123
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: whatsapp_saas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
